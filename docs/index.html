    <!-- Run before first paint: marks html so CSS hides overlay immediately if session already seen -->
    <script>if(sessionStorage.getItem('wo_seen'))document.documentElement.setAttribute('data-wo-skip','1')</script>
    <style>
    /* Hide overlay instantly on repeat visits before any paint */
    [data-wo-skip='1'] #welcome-overlay { display: none !important; }

    @viewport {
        width: device-width;
        zoom: 1.0;
    }

    @-ms-viewport {
        width: device-width ;
    }

    body  {
        background:
    }
    @media (min-width: 1080px) {
        body  {
            background: url("assets/images/IMG_1813.JPG") no-repeat center center fixed;
            background-size: cover;
        }
    }


    .hidden {
        display: none;
    }

    .nav {
        top: 5px;
        right: 10px;
        position: absolute;
        font-family: 'Damion', cursive;
    }

    .title {
        font-size: 200px;
        color: white;
        font-family: 'Damion', cursive;
        padding: 10px;
        animation-name: topFadeIn;
        animation-duration: 2s;
        top: 10rem;
        left: 26rem;
        position: absolute;
        text-align: center;
    }


    .animation-box-title {
        width: 75rem;
        height: 22rem;
        margin: 0 auto;
        overflow: hidden;
        left: auto;
    }


    @keyframes topFadeIn {
        0% {
          position: absolute;
          top: -3rem;
          opacity: 0;
        }
        75% {
          position: absolute;
          opacity: 1;
        }

        100% {
          opacity: 1;
        }
    }


    .gallery-container {
        width: 100%;
        height: 100%;
    }

    .basic-intro {
        width: 100%;
        height: 10px;
    }

    .basic-intro-p {
        animation-name: FadeIn;
        animation-duration: 4s;
        font-family: 'Damion', cursive;
        color: white;
        font-size: 2em;
        text-align: center;
        margin-left: 10em;
        margin-top: 2.5em;
    }

    @keyframes FadeIn {
        0% {
          opacity: 0;
        }

        50% {
          opacity: 0;
        }
        100% {
          opacity: 1;
        }
    }

    /* Tablet (768px–1079px) */
    @media (min-width: 768px) and (max-width: 1079px) {
        .title {
            font-size: 110px;
            left: 8rem;
            top: 8rem;
        }
        .animation-box-title {
            width: 100%;
            height: 18rem;
        }
        .basic-intro-p {
            margin-left: 5em;
        }
    }

    /* Mobile (up to 767px) */
    @media (max-width: 767px) {
        .nav {
            font-size: 14px;
        }
        .title {
            font-size: clamp(40px, 13vw, 80px);
            left: 0;
            right: 0;
            top: 4rem;
            text-align: center;
        }
        .animation-box-title {
            width: 100%;
            height: 10rem;
        }
        .basic-intro-p {
            margin-left: 0;
            padding: 0 1em;
            font-size: 1.4em;
            margin-top: 4em;
        }
    }

    /* ===== Welcome Overlay ===== */
    #welcome-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #04080f;
        overflow: hidden;
        animation: wo-fade-out 0.8s cubic-bezier(0.4, 0, 1, 1) 2.4s forwards;
    }

    /* Aurora orbs — layered radial gradients that drift slowly */
    .wo-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(90px);
        pointer-events: none;
    }
    .wo-orb-1 {
        width: 80vmax; height: 80vmax;
        bottom: -25vmax; left: -18vmax;
        background: radial-gradient(circle, rgba(0, 78, 210, 0.6) 0%, transparent 68%);
        animation: wo-drift-1 9s ease-in-out infinite alternate;
    }
    .wo-orb-2 {
        width: 60vmax; height: 60vmax;
        top: -18vmax; right: -12vmax;
        background: radial-gradient(circle, rgba(72, 14, 200, 0.5) 0%, transparent 68%);
        animation: wo-drift-2 11s ease-in-out infinite alternate;
    }
    .wo-orb-3 {
        width: 44vmax; height: 44vmax;
        top: 30%; left: 38%;
        background: radial-gradient(circle, rgba(0, 160, 210, 0.22) 0%, transparent 65%);
        animation: wo-drift-3 7s ease-in-out infinite alternate;
    }

    @keyframes wo-drift-1 {
        from { transform: translate(0, 0) scale(1); }
        to   { transform: translate(4vw, -5vh) scale(1.09); }
    }
    @keyframes wo-drift-2 {
        from { transform: translate(0, 0) scale(1); }
        to   { transform: translate(-4vw, 4vh) scale(1.06); }
    }
    @keyframes wo-drift-3 {
        from { transform: translate(0, 0) scale(1); }
        to   { transform: translate(3vw, -3vh) scale(1.12); }
    }

    /* Very subtle grain layer */
    #welcome-overlay::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
            repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(255,255,255,0.012) 2px,
                rgba(255,255,255,0.012) 4px
            );
        pointer-events: none;
    }

    .wo-content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2.2rem;
    }

    .wo-text {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
        font-size: clamp(52px, 10vw, 100px);
        font-weight: 100;
        color: #ffffff;
        letter-spacing: 0.02em;
        animation: wo-text-in 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
    }

    #wo-skip {
        position: absolute;
        top: 20px;
        right: 24px;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
        font-size: 12px;
        font-weight: 400;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55);
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 20px;
        padding: 7px 22px;
        cursor: pointer;
        z-index: 2;
        animation: wo-text-in 0.8s ease 1.2s both;
        transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
    }
    #wo-skip:hover {
        background: rgba(255, 255, 255, 0.18);
        color: rgba(255, 255, 255, 0.9);
        border-color: rgba(255, 255, 255, 0.35);
    }

    @keyframes wo-text-in {
        from { opacity: 0; transform: translateY(22px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes wo-fade-out {
        from { opacity: 1; }
        to   { opacity: 0; pointer-events: none; }
    }

    </style>
</head>

<script>
(function () {
    var overlay = document.getElementById('welcome-overlay');
    if (!overlay) return;

    function dismiss(fast) {
        var duration = fast ? 0.45 : 0.8;
        overlay.style.animation = 'wo-fade-out ' + duration + 's cubic-bezier(0.4,0,1,1) forwards';
        setTimeout(function () {
            overlay.remove();
        }, duration * 1000);
        sessionStorage.setItem('wo_seen', '1');
    }

    document.getElementById('wo-skip').addEventListener('click', function () {
        dismiss(true);
    });

    /* Remove element after CSS auto-fade-out finishes (fires on the overlay's own animation) */
    overlay.addEventListener('animationend', function (e) {
        if (e.animationName === 'wo-fade-out') {
            overlay.remove();
            sessionStorage.setItem('wo_seen', '1');
        }
    });
}());
</script>
