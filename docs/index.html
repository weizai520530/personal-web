<!DOCTYPE html>
<html>
<head>
    <!-- system-ui (SF Pro on Apple) used for all text — no external font needed -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="pse/css/reset.css">
  	<link rel="stylesheet" href="pse/css/style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>
    <script src="pse/js/modernizr.js"></script>
    <!-- Run before first paint: marks html so CSS hides overlay immediately if session already seen -->
    <script>if(sessionStorage.getItem('wo_seen'))document.documentElement.setAttribute('data-wo-skip','1')</script>
    <style>
    /* Hide overlay instantly on repeat visits before any paint */
    [data-wo-skip='1'] #welcome-overlay { display: none !important; }

    @viewport {
        width: device-width;
        zoom: 1.0;
    }

    @-ms-viewport {
        width: device-width ;
    }

    body  {
        background:
    }
    @media (min-width: 1080px) {
        body  {
            background: url("assets/images/background.png") no-repeat center center fixed;
            background-size: cover;
        }
    }


    .hidden {
        display: none;
    }

    .nav {
        top: 14px;
        right: 18px;
        position: absolute;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
        font-size: 13px;
        font-weight: 400;
        letter-spacing: 0.02em;
        color: rgba(255, 255, 255, 0.4);
        z-index: 10;
    }
    .nav a {
        background: linear-gradient(
            110deg,
            rgba(255,255,255,0.95)  0%,
            rgba(210,235,255,0.70) 45%,
            rgba(255,255,255,0.90) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 1px 3px rgba(0,0,0,0.18));
        transition: filter 0.2s ease;
    }
    .nav a:hover {
        filter: drop-shadow(0 1px 6px rgba(200,225,255,0.4));
    }

    /* Hero: centres title + subtitle in the viewport */
    .hero {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.4rem;
    }

    .title {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
        font-size: clamp(56px, 10vw, 128px);
        font-weight: 200;
        letter-spacing: -0.02em;
        padding: 0 1rem;
        position: relative;
        top: 0;
        text-align: center;
        animation: titleSlideIn 1.3s cubic-bezier(0.16, 1, 0.3, 1) both,
                   liquidSheen  3.5s linear 1.3s infinite;
        background: linear-gradient(
            110deg,
            rgba(255,255,255,0.72)  0%,
            rgba(228,242,255,0.60) 28%,
            rgba(255,255,255,1.00) 40%,
            rgba(255,255,255,1.00) 54%,
            rgba(228,242,255,0.60) 72%,
            rgba(255,255,255,0.76) 100%
        );
        background-size: 300% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 2px 6px rgba(0,0,0,0.12));
    }

    .animation-box-title {
        width: 100%;
        overflow: hidden;
        position: relative;
        padding: 0.4rem 0 0.6rem;
    }

    @keyframes titleSlideIn {
        from { top: -4rem; opacity: 0; }
        to   { top:  0;    opacity: 1; }
    }

    /* Liquid sheen: a bright band sweeps left across the text */
    @keyframes liquidSheen {
        from { background-position: 200% center; }
        to   { background-position: -100% center; }
    }

    .gallery-container {
        width: 100%;
        height: 100%;
    }

    .basic-intro {
        width: 100%;
    }

    .basic-intro-p {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
        font-weight: 300;
        font-size: clamp(13px, 1.6vw, 17px);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        text-align: center;
        padding: 0 1.5rem;
        margin: 0;
        animation: subtitleFadeIn 2.8s ease both;
        background: linear-gradient(
            110deg,
            rgba(255,255,255,0.78)  0%,
            rgba(218,238,255,0.58) 50%,
            rgba(255,255,255,0.72) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 1px 4px rgba(0,0,0,0.10));
    }

    @keyframes subtitleFadeIn {
        0%   { opacity: 0; transform: translateY(10px); }
        50%  { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
    }

    /* Mobile */
    @media (max-width: 767px) {
        .nav { font-size: 11px; }
        .basic-intro-p { letter-spacing: 0.14em; }
    }

    /* ===== Welcome Overlay ===== */
    #welcome-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #04080f;
        overflow: hidden;
        animation: wo-fade-out 0.8s cubic-bezier(0.4, 0, 1, 1) 2.4s forwards;
    }

    /* Aurora orbs — layered radial gradients that drift slowly */
    .wo-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(90px);
        pointer-events: none;
    }
    .wo-orb-1 {
        width: 80vmax; height: 80vmax;
        bottom: -25vmax; left: -18vmax;
        background: radial-gradient(circle, rgba(0, 78, 210, 0.6) 0%, transparent 68%);
        animation: wo-drift-1 9s ease-in-out infinite alternate;
    }
    .wo-orb-2 {
        width: 60vmax; height: 60vmax;
        top: -18vmax; right: -12vmax;
        background: radial-gradient(circle, rgba(72, 14, 200, 0.5) 0%, transparent 68%);
        animation: wo-drift-2 11s ease-in-out infinite alternate;
    }
    .wo-orb-3 {
        width: 44vmax; height: 44vmax;
        top: 30%; left: 38%;
        background: radial-gradient(circle, rgba(0, 160, 210, 0.22) 0%, transparent 65%);
        animation: wo-drift-3 7s ease-in-out infinite alternate;
    }

    @keyframes wo-drift-1 {
        from { transform: translate(0, 0) scale(1); }
        to   { transform: translate(4vw, -5vh) scale(1.09); }
    }
    @keyframes wo-drift-2 {
        from { transform: translate(0, 0) scale(1); }
        to   { transform: translate(-4vw, 4vh) scale(1.06); }
    }
    @keyframes wo-drift-3 {
        from { transform: translate(0, 0) scale(1); }
        to   { transform: translate(3vw, -3vh) scale(1.12); }
    }

    /* Very subtle grain layer */
    #welcome-overlay::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
            repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(255,255,255,0.012) 2px,
                rgba(255,255,255,0.012) 4px
            );
        pointer-events: none;
    }

    .wo-content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2.2rem;
    }

    .wo-text {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
        font-size: clamp(52px, 10vw, 100px);
        font-weight: 100;
        color: #ffffff;
        letter-spacing: 0.02em;
        animation: wo-text-in 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
    }

    #wo-skip {
        position: absolute;
        top: 20px;
        right: 24px;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
        font-size: 12px;
        font-weight: 400;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55);
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 20px;
        padding: 7px 22px;
        cursor: pointer;
        z-index: 2;
        animation: wo-text-in 0.8s ease 1.2s both;
        transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
    }
    #wo-skip:hover {
        background: rgba(255, 255, 255, 0.18);
        color: rgba(255, 255, 255, 0.9);
        border-color: rgba(255, 255, 255, 0.35);
    }

    @keyframes wo-text-in {
        from { opacity: 0; transform: translateY(22px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes wo-fade-out {
        from { opacity: 1; }
        to   { opacity: 0; pointer-events: none; }
    }

    </style>
</head>

<script>
(function () {
    var overlay = document.getElementById('welcome-overlay');
    if (!overlay) return;

    function dismiss(fast) {
        var duration = fast ? 0.45 : 0.8;
        overlay.style.animation = 'wo-fade-out ' + duration + 's cubic-bezier(0.4,0,1,1) forwards';
        setTimeout(function () {
            overlay.remove();
        }, duration * 1000);
        sessionStorage.setItem('wo_seen', '1');
    }

    document.getElementById('wo-skip').addEventListener('click', function () {
        dismiss(true);
    });

    /* Remove element after CSS auto-fade-out finishes (fires on the overlay's own animation) */
    overlay.addEventListener('animationend', function (e) {
        if (e.animationName === 'wo-fade-out') {
            overlay.remove();
            sessionStorage.setItem('wo_seen', '1');
        }
    });
}());
</script>
